<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설비 분석실 (Machine Engineering) — 메모리 반도체 공정 아카데미</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💾</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topnav">
    <a class="brand" href="index.html"><span class="logo-dot"></span>메모리 반도체 <em>공정 아카데미</em></a>
    <nav></nav>
  </header>

  <main class="eq-layout">
    <aside class="eq-side">
      <h3 style="font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.09em;margin:0 6px 10px;font-weight:700">보기 모드</h3>
      <div id="eq-mode" style="display:flex;gap:6px;margin-bottom:14px">
        <button class="btn small" id="mode-log" style="flex:1">📟 설비 로그</button>
        <button class="btn small" id="mode-metro" style="flex:1">🔬 계측 장비</button>
      </div>
      <div id="side-log">
        <h3 style="font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.09em;margin:16px 6px 10px;font-weight:700">팹 설비 목록</h3>
        <div id="eq-tools"></div>
        <h3 style="font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.09em;margin:20px 6px 10px;font-weight:700">🎓 OCAP 트러블슈팅</h3>
        <p style="font-size:11.5px;color:var(--dim);margin:0 6px 8px">
          알람 시나리오가 주입된 로그를 분석해 원인을 진단하는 Machine Engineer 실습입니다.
        </p>
        <div id="eq-cases"></div>
      </div>
      <div id="side-metro" style="display:none">
        <p style="font-size:12px;color:var(--muted);margin:6px">
          계측(Metrology) 장비는 공정 결과를 <b>숫자</b>로 바꿔 Spotfire 분석의 원천 데이터를 만듭니다.
          각 장비의 원리와 측정 데이터가 어느 SPC 차트로 이어지는지 확인하세요.
        </p>
      </div>
    </aside>

    <section class="eq-main">
      <div class="sf-toolbar">
        <span class="sf-title" id="eq-title"></span>
        <button class="btn small" id="eq-regen">🔄 새 교대 로그</button>
        <button class="btn small" id="eq-reset" style="display:none">✅ 조치 완료 — 정상 로그 확인</button>
      </div>
      <div class="eq-dash" id="eq-dash"></div>
    </section>
  </main>

  <script type="module" src="js/equipment.js"></script>
</body>
</html>
