<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotfire 분석실 — 메모리 반도체 공정 아카데미</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💾</text></svg>">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topnav">
    <a class="brand" href="index.html"><span class="logo-dot"></span>메모리 반도체 <em>공정 아카데미</em></a>
    <nav></nav>
  </header>

  <main class="sf-layout">
    <aside class="sf-side">
      <h3>공정 선택</h3>
      <div id="sf-procs"></div>
      <h3>🎓 이상 사례 학습</h3>
      <p style="font-size:11.5px;color:var(--dim);margin-bottom:8px">
        케이스를 선택하면 해당 이상이 주입된 데이터가 생성됩니다.
        차트에서 이상을 찾고 퀴즈로 원인을 진단하세요.
      </p>
      <div id="sf-cases"></div>
    </aside>

    <section class="sf-main">
      <div class="sf-toolbar">
        <span class="sf-title" id="sf-title"></span>
        <label style="font-size:12px;color:var(--dim)">파라미터
          <select id="sf-param"></select>
        </label>
        <button class="btn small" id="sf-regen">🔄 새 데이터 수집</button>
        <button class="btn small" id="sf-reset" style="display:none">✅ 조치 완료 — 정상 확인</button>
      </div>
      <div class="sf-dash" id="sf-dash"></div>
    </section>
  </main>

  <script type="module" src="js/spotfire/spotfire.js"></script>
</body>
</html>
